name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 5.38.1)"
        required: true
        type: string
  pull_request:
    branches: [main]
    paths:
      - "docker/Dockerfile"
      - ".dockerignore"
      - "docker/docker-compose.yml"
      - "docker/.env.example"
      - "docker/DOCKER_README.md"
      - "docker/install.sh"
      - "packages/backend/**"
      - "packages/frontend/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"

permissions:
  contents: read

jobs:
  validate:
    name: Build (validate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Build & Publish
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: manifestdotbuild/manifest
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }}
            type=sha

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - uses: sigstore/cosign-installer@v3

      - name: Sign published image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: manifestdotbuild/manifest
          short-description: "Smart LLM router for personal AI agents. Self-host with Docker."
          readme-filepath: ./docker/DOCKER_README.md
