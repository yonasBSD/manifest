# This compose file is intended for local testing only. Before exposing
# this instance beyond localhost:
#   - Replace BETTER_AUTH_SECRET below with a real secret. Generate one
#     with: openssl rand -hex 32
#   - Set SEED_DATA=false to stop seeding the demo agent on every boot.
#   - Change the seeded admin password (admin@manifest.build / manifest).
#   - Set NODE_ENV=production to enable trust proxy, error sanitization,
#     and strict Better Auth verification.

services:
  manifest:
    image: manifestdotbuild/manifest:latest
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://manifest:manifest@postgres:5432/manifest
      # ⚠  Placeholder. Replace before any non-localhost use (see top of file).
      - BETTER_AUTH_SECRET=change-me-to-a-random-32-char-string!!
      - BETTER_AUTH_URL=http://localhost:3001
      - SEED_DATA=true
      - NODE_ENV=development
      - AUTO_MIGRATE=true
      # Email provider (optional). Covers both login/verification emails
      # and threshold alert notifications. Set one provider block — see
      # DOCKER_README.md "Email setup". Supports resend, mailgun, sendgrid.
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-}
      - EMAIL_API_KEY=${EMAIL_API_KEY:-}
      - EMAIL_DOMAIN=${EMAIL_DOMAIN:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      # OAuth providers (optional). Activate when both ID and SECRET are set.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    pids_limit: 256
    networks:
      - internal
      - frontend

  postgres:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    environment:
      - POSTGRES_USER=manifest
      - POSTGRES_PASSWORD=manifest
      - POSTGRES_DB=manifest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U manifest
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

volumes:
  pgdata:
